services:
  db:
    image: postgres:16
    env_file: .env
    expose:
      - '5432'
    volumes:
      - flickpick-db:/var/lib/postgresql/data
      - ./src/init_data:/docker-entrypoint-initdb.d
  web:
    image: node:lts
    working_dir: /repository
    env_file: .env
    environment:
      - NODE_ENV=development
    depends_on:
      - db
    ports:
      - '3000:3000'
    volumes:
      - ./:/repository
      - /repository/node_modules
    command: sh -c "npm install && npm start"
volumes:
  flickpick-db:
